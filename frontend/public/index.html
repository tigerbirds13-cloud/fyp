<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Hometown Helper - Job Portal Application"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * {
        font-family: 'DM Sans', sans-serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Syne', sans-serif;
      }
      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-20px);
        }
      }
      .float-animation {
        animation: float 3s ease-in-out infinite;
      }
      .float-animation-delay-1 {
        animation-delay: 0s;
      }
      .float-animation-delay-2 {
        animation-delay: 0.5s;
      }
      .float-animation-delay-3 {
        animation-delay: 1s;
      }
      .float-animation-delay-4 {
        animation-delay: 1.5s;
      }
    </style>
    <title>Hometown Helper - Find Your Dream Job</title>
  </head>
  <body class="bg-black">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
